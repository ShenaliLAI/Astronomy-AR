<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Glow -->
  <circle cx="600" cy="400" r="300" fill="#ffde59" fill-opacity="0.05" filter="blur(100px)"/>
  
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Connection Lines -->
  <g id="connections" stroke="#ffde59" stroke-width="2" stroke-opacity="0.2">
    <!-- Center to Top -->
    <path d="M600 300 V180"/>
    <path d="M600 300 L300 180"/>
    <path d="M600 300 L900 180"/>
    
    <!-- Center to Sides -->
    <path d="M450 380 H200"/>
    <path d="M750 380 H1000"/>
    
    <!-- Center to Bottom -->
    <path d="M600 460 V600"/>
    <path d="M600 460 L300 600"/>
    <path d="M600 460 L900 600"/>
  </g>

  <!-- Core Hub -->
  <g id="unity-hub">
    <rect x="450" y="300" width="300" height="160" rx="20" fill="black" stroke="#ffde59" stroke-width="3" filter="url(#glow)"/>
    <text x="600" y="375" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Unity Rendering Engine</text>
    <text x="600" y="410" font-family="Arial, sans-serif" font-size="16" fill="#ffde59" text-anchor="middle">SYSTEM CORE HUB</text>
  </g>

  <!-- Top Layer -->
  <g id="ui-module">
    <rect x="500" y="80" width="200" height="100" rx="15" fill="#080808" stroke="#ffde59" stroke-width="2"/>
    <text x="600" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">User Interface Module</text>
    <text x="600" y="150" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">Menus & Interactions</text>
  </g>

  <g id="camera-module">
    <rect x="200" y="80" width="200" height="100" rx="15" fill="#080808" stroke="#ffde59" stroke-width="2"/>
    <text x="300" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">AR Camera Module</text>
    <text x="300" y="150" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">Real-time Feed</text>
  </g>

  <g id="vuforia-module">
    <rect x="800" y="80" width="200" height="100" rx="15" fill="#080808" stroke="#ffde59" stroke-width="2"/>
    <text x="900" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Vuforia Image Target</text>
    <text x="900" y="150" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">Recognition Engine</text>
  </g>

  <!-- Middle Sides -->
  <g id="content-module">
    <rect x="50" y="330" width="200" height="100" rx="15" fill="#080808" stroke="#ffde59" stroke-width="2"/>
    <text x="150" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Educational Content</text>
    <text x="150" y="400" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">Lessons & Facts</text>
  </g>

  <g id="model-manager">
    <rect x="950" y="330" width="200" height="100" rx="15" fill="#080808" stroke="#ffde59" stroke-width="2"/>
    <text x="1050" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">3D Model Manager</text>
    <text x="1050" y="400" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">Astronomy Assets</text>
  </g>

  <!-- Bottom Layer -->
  <g id="database-module">
    <rect x="500" y="600" width="200" height="100" rx="15" fill="#080808" stroke="#ffde59" stroke-width="2"/>
    <text x="600" y="650" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Database & Storage</text>
    <text x="600" y="670" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">Student Data Sync</text>
  </g>

  <g id="quiz-module">
    <rect x="200" y="600" width="200" height="100" rx="15" fill="#080808" stroke="#ffde59" stroke-width="2"/>
    <text x="300" y="650" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Quiz & Assessment</text>
    <text x="300" y="670" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">Evaluation Module</text>
  </g>

  <g id="feedback-module">
    <rect x="800" y="600" width="200" height="100" rx="15" fill="#080808" stroke="#ffde59" stroke-width="2"/>
    <text x="900" y="650" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Performance Tracking</text>
    <text x="900" y="670" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">Feedback Generation</text>
  </g>
</svg>
